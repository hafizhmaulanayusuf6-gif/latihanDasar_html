<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube</title>
    <link rel="stylesheet" href="Folder_css/17a.css">
</head>
<body>

    <header class="header">

        <div class="left-section">
            <img class="hamburger" src="Image-icons/hamburger.svg">
            <img class="logo" src="Image-icons/youtube-logo.svg">
        </div>

        <div class="middle-section">
            <input class="search" type="text" placeholder="Search">
            <button class="search-button">
                <img class="icon" src="Image-icons/search.svg">
            </button>
            <button class="voice">
                <img class="icon" src="Image-icons/voice-search-icon.svg">
            </button>
        </div>

        <div class="right-section">
            <button class="btn-icon">
                <img class="icon" src="Image-icons/upload.svg">
            </button>
            <button class="btn-icon">
                <img class="icon" src="Image-icons/youtube-apps.svg">
            </button>
            <button class="btn-icon">
                <img class="icon" src="Image-icons/notifications.svg">
            </button>
            <img class="profile" src="../../image/Kucing2.jpg">
        </div>

    </header>

    <nav class="sidebar">
        <div class="sidebar-link">
            <img src="Image-icons/home.svg">
            <span>Home</span>
        </div>
        <div class="sidebar-link">
            <img src="Image-icons/explore.svg">
            <span>Explore</span>
        </div>
        <div class="sidebar-link">
            <img src="Image-icons/subscriptions.svg">
            <span>Subscriptions</span>
        </div>
        <div class="sidebar-link">
            <img src="Image-icons/originals.svg">
            <span>Originals</span>
        </div>
        <div class="sidebar-link">
            <img src="Image-icons/youtube-music.svg">
            <span>YouTube Music</span>
        </div>
        <div class="sidebar-link">
            <img src="Image-icons/library.svg">
            <span>Library</span>
        </div>
    </nav>

    <main class="main-content">

    </main>

</body>
</html>
