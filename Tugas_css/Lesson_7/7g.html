<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7g</title>

    <style>
        .profile {
            height: 50px;
            width: 50px;
            object-fit: cover;
            border-radius: 25px;
            vertical-align: middle;
        }

        .tweet-input {
            border: none;
            outline: none;
            width: 300px;
            vertical-align: middle;
            font-size: 17px;
        }

        .Tweet {
            background-color: rgb(0, 140, 255);
            color: white;
            font-family: 15px;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            height: 30px;
            width: 80px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
        <img class="profile" src="../../image/Kucing.jpg" alt="Kucing">

        <input class="tweet-input" type="text" placeholder="What's happening?">
        
        <button class="Tweet">
            Tweet
        </button>
</body>
</html>
