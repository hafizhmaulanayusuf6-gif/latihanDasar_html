<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2d</title>
</head>
<body>
    <button class="Get_started">
        Get started
    </button>

    <button class="Download">
        Download
    </button>

    <style>
        .Get_started {
           background-color: rgb(121, 89, 179);
           color: white; 
           border: none;
           text-align: center;
           font-weight: bold;
           border-radius: 5px;
           height: 50px;
           width: 120px;
        }

        .Download {
            background-color: white;
            color: rgb(108, 117, 125);
            border: 1px solid rgb(108, 117, 125);
            text-align: center;
            font-weight: bold;
            border-radius: 5px;
            height: 50px;
            width: 120px;
        }
    </style>
</body>
</html>
