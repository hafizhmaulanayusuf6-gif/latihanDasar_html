<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>linkedln</title>
    <style>
        .apply {
            background-color: rgb(10, 102, 194);
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            height: 40px;
            width: 200px;
            cursor: pointer;
            transition: background-color 0.15s;
        }

        .apply:hover {
            background-color: rgb(0, 73, 146); /* Biru lebih gelap */
        }

        .save {
            background-color: white;
            color: rgb(10, 102, 194);
            border: 1px solid rgb(10, 102, 194);
            font-weight: bold;
            border-radius: 20px;
            height: 40px;
            width: 80px;
            cursor: pointer;
            transition: background-color 0.15s, color 0.15s;
        }

        .save:hover {
            background-color: rgb(10, 102, 194);
            color: white;
        }
    </style>
</head>
<body>
    <button class="apply">Apply on company website</button>
    <button class="save">Save</button>
</body>
</html>
