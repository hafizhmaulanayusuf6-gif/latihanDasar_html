<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2c</title>
    <style>
        .tombol-github {
            background-color: rgb(46, 164, 79);
            color: white;
            border: none;
            font-weight: bold;
            text-align: center;
            border-radius: 5px;
            height: 45px;
            width: 95px;
            cursor: pointer;
            transition: box-shadow 0.15s, opacity 0.15s;
        }

        .tombol-github:hover {
            box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.2);
        }

        .tombol-github:active {
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <button class="tombol-github">
        Sign up
    </button>
</body>
</html>
