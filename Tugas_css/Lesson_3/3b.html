<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .cart {
            background-color: rgb(255, 216, 20);
            border: none;
            border-radius: 30px;
            height: 30px;
            width: 200px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .cart:active {
            background-color: rgb(247, 202, 0);
        }
    </style>
</head>
<body>
    <button class="cart">
        Add to cart
    </button>
</body>
</html>
