<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uber</title>
    <style>
        .uber {
            background-color: black;
            color: white;
            height: 40px;
            width: 110px;
            border: none;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .uber:hover {
            opacity: 0.8;
        }

        .uber:active {
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <button class="uber">
        Request now
    </button>
</body>
</html>
