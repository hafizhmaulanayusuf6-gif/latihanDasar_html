<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8c</title>

    <style>
        .image {
            display: block;
            height: 500px;
            width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .text {
            width: 500px;
            border: 1px solid;
            padding-top: 12px;
            padding-bottom: 12px;
            padding-left: 20px;
            padding-right: 20px;
            border: 1px solid rgb(221, 221, 221);
            border-radius: 50px;
            font-size: 15px;
            box-shadow: 0 1px 6px rgb(32, 33, 36, 0.28);
        }
    </style>
</head>
<body>
    <img class="image" src="../../image/google.jpg" alt="logo google">
    <input class="text" type="text" placeholder="search Google or type a URL"
</body>
</html>
